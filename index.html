<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Memória - MIS Ceará</title>
    
    <style>
        :root { 
            --primary: #006400; --secondary: #2196F3; --success: #27ae60; 
            --danger: #e74c3c; --dark: #121212; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); 
            color: white; text-align: center; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Splash Screen - Ajuste de visibilidade */
        #splash-screen {
            position: fixed; inset: 0; background: #121212; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10001;
        }
        .splash-logo { width: 300px; height: auto; border-radius: 20px; margin-bottom: 20px; border: 2px solid #333; background: #121212; }

        header { 
            height: 12vh; background: #1f1f1f; border-bottom: 2px solid #333; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 4vw; flex-shrink: 0; 
        }
        .header-player { font-size: 3vh; color: var(--secondary); font-weight: bold; }
        
        .btn-reset-top {
            background: #333; color: #fff; border: 1px solid #555; padding: 1vh 2vh;
            border-radius: 5px; font-size: 1.8vh; cursor: pointer;
        }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2vh; overflow: hidden; }

        .grid { 
            display: grid; gap: 1.5vh; height: 100%; max-height: 75vh;
            grid-template-columns: repeat(var(--cols, 4), minmax(0, 1fr)); 
            aspect-ratio: var(--cols) / calc((var(--total-pares) * 2) / var(--cols));
        }

        .card { width: 100%; height: 100%; perspective: 1000px; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flip .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; border-radius: 10px; backface-visibility: hidden; background-size: cover; background-position: center; }
        .front { background-image: url('imagens/capa.jpg'); border: 2px solid #444; }
        .back { transform: rotateY(180deg); border: 2px solid var(--primary); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: flex; align-items: center; justify-content: center; z-index: 9000; }
        .box { background: #222; padding: 4vh; border-radius: 15px; width: 85vw; max-width: 800px; border: 2px solid #444; }

        #feedback { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--success); color: white; padding: 3vh 6vh; 
            border-radius: 50px; font-size: 5vh; font-weight: bold; 
            z-index: 10000; display: none;
        }

        /* Animação de Confetes */
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .teclado-row { display: flex; justify-content: center; gap: 0.5vw; margin-bottom: 1vh; }
        .key { flex: 1; padding: 2.5vh 0; background: #333; border-radius: 5px; font-size: 2.2vh; border: 1px solid #444; color: white; cursor: pointer; }
        
        button { padding: 2.5vh; font-size: 2.5vh; font-weight: bold; border-radius: 10px; border: none; color: white; cursor: pointer; width: 100%; margin-top: 1vh; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="imagens/logo_ini.jpg" class="splash-logo" alt="Logo MIS" onerror="console.log('Erro ao carregar logo_ini.jpg')">
    <div style="font-size: 2.5vh; color: var(--success); font-weight: bold;">CARREGANDO...</div>
</div>

<div id="feedback">VOCÊ ACERTOU!</div>

<header>
    <div style="text-align: left;">
        <div style="font-size: 1.5vh; opacity: 0.7;">MIS CEARÁ</div>
        <div id="header-player" class="header-player">IDENTIFIQUE-SE</div>
    </div>
    <div id="status-bar" style="font-size: 2.5vh; font-weight: bold;"></div>
    <button class="btn-reset-top" onclick="location.reload()">REINICIAR</button>
</header>

<div class="main-content">
    <div id="menu" class="hidden">
        <h2 style="margin-bottom: 3vh; font-size: 4vh;">Escolha o Nível</h2>
        <div style="display: flex; flex-direction: column; width: 350px; margin: auto; gap: 15px;">
            <button onclick="comecarJogo(1)" style="background: var(--primary);">NÍVEL 1</button>
            <button onclick="comecarJogo(2)" style="background: var(--primary);">NÍVEL 2</button>
            <button onclick="comecarJogo(3)" style="background: var(--primary);">NÍVEL 3</button>
        </div>
    </div>
    <div id="grid" class="grid hidden"></div>
</div>

<div id="modal-nome" class="modal">
    <div class="box">
        <h2 style="font-size: 3.5vh; margin-bottom: 2vh;">Digite seu Nome</h2>
        <input type="text" id="nome-display" style="font-size: 5vh; padding: 1.5vh; background: #000; border: 2px solid var(--secondary); color: white; text-align: center; width: 100%; margin-bottom: 2vh;" readonly>
        <div id="keys-container"></div>
        <div style="display: flex; gap: 15px;">
            <button onclick="salvarNome()" style="background: var(--success); flex: 2;">CONFIRMAR</button>
            <button onclick="jogarSemNome()" style="background: #555; flex: 1;">PULAR</button>
        </div>
    </div>
</div>

<div id="modal-conclusao" class="modal hidden">
    <div class="box">
        <h2 id="titulo-vitoria" style="font-size: 5vh; margin-bottom: 2vh;">🏆 VITÓRIA!</h2>
        <p id="msg-vitoria" style="font-size: 3vh; margin-bottom: 3vh;"></p>
        <button id="btn-proxima-fase" onclick="proximaFase()" style="background: var(--success);">PRÓXIMA FASE</button>
        <button onclick="voltarInicio()" style="background: #444;">MENU PRINCIPAL</button>
    </div>
</div>

<div id="modal-gameover" class="modal hidden">
    <div class="box">
        <h2 style="color: var(--danger); font-size: 5vh;">⏰ TEMPO ESGOTADO</h2>
        <button onclick="recomecarFase()" style="background: var(--secondary);">TENTAR NOVAMENTE</button>
        <button onclick="voltarInicio()" style="background: #444;">SAIR</button>
    </div>
</div>

<script>
const MIN_IMAGEM = 2, MAX_IMAGEM = 40;
const fases = { 1: { pares: 8, colunas: 4, tempo: 45, preview: 2 }, 2: { pares: 10, colunas: 5, tempo: 60, preview: 3 }, 3: { pares: 12, colunas: 6, tempo: 90, preview: 4 } };
let nomeUsuario = "", jogoAtual, primeira, segunda, bloqueado = true, paresRestantes, tempoRestante, timerInterval = null;

function criarTeclado() {
    const container = document.getElementById("keys-container");
    const layout = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM", "← "];
    container.innerHTML = "";
    layout.forEach(linha => {
        const row = document.createElement("div"); row.className = "teclado-row";
        const teclas = linha.includes(" ") ? ["←", "ESPAÇO"] : linha.split("");
        teclas.forEach(t => {
            const b = document.createElement("div"); b.className = "key";
            if(t.length > 1) b.style.flex = "2.5";
            b.innerText = t; 
            b.onclick = () => digitar(t === "←" ? "BS" : t === "ESPAÇO" ? "SP" : t);
            row.appendChild(b);
        });
        container.appendChild(row);
    });
}

function digitar(t) {
    const inp = document.getElementById("nome-display");
    if(t === "BS") inp.value = inp.value.slice(0, -1);
    else if(t === "SP") { if(inp.value.length < 12) inp.value += " "; }
    else if(inp.value.length < 12) inp.value += t;
}

function salvarNome() { nomeUsuario = document.getElementById("nome-display").value.trim() || "VISITANTE"; finalizarLogin(); }
function jogarSemNome() { nomeUsuario = "VISITANTE"; finalizarLogin(); }
function finalizarLogin() { document.getElementById("modal-nome").classList.add("hidden"); document.getElementById("header-player").innerText = `JOGADOR: ${nomeUsuario}`; voltarInicio(); }

function fecharTodosModais() {
    document.querySelectorAll(".modal").forEach(m => m.classList.add("hidden"));
}

function voltarInicio() { 
    if(timerInterval) clearInterval(timerInterval);
    fecharTodosModais();
    document.getElementById("grid").classList.add("hidden"); 
    document.getElementById("menu").classList.remove("hidden"); 
    document.getElementById("status-bar").innerText = "";
}

function comecarJogo(n) {
    if(timerInterval) clearInterval(timerInterval);
    fecharTodosModais();
    jogoAtual = {...fases[n], nivel: n};
    document.getElementById("menu").classList.add("hidden");
    const g = document.getElementById("grid"); 
    g.classList.remove("hidden");
    g.style.setProperty('--cols', jogoAtual.colunas); 
    g.style.setProperty('--total-pares', jogoAtual.pares);
    g.innerHTML = "";
    paresRestantes = jogoAtual.pares; tempoRestante = jogoAtual.tempo; bloqueado = true;
    primeira = null; segunda = null;
    
    let p = []; for(let i=MIN_IMAGEM; i<=MAX_IMAGEM; i++) p.push(i);
    p.sort(() => Math.random()-0.5);
    const sel = p.slice(0, jogoAtual.pares).map(num => `imagens/${num}.jpg`);
    let deck = [...sel, ...sel].sort(() => Math.random()-0.5);
    
    deck.forEach(url => {
        const c = document.createElement("div"); c.className = "card flip";
        c.innerHTML = `<div class="inner"><div class="front"></div><div class="back" style="background-image:url('${url}')"></div></div>`;
        c.onclick = () => clicarCarta(c, url); g.appendChild(c);
    });

    setTimeout(() => { 
        document.querySelectorAll(".card").forEach(c => c.classList.remove("flip")); 
        bloqueado = false; iniciarCronometro(); 
    }, jogoAtual.preview * 1000);
}

function iniciarCronometro() {
    timerInterval = setInterval(() => {
        tempoRestante--; 
        document.getElementById("status-bar").innerText = `TEMPO: ${tempoRestante}s`;
        if(tempoRestante <= 0) { 
            clearInterval(timerInterval);
            document.getElementById("modal-gameover").classList.remove("hidden"); 
        }
    }, 1000);
}

function clicarCarta(card, img) {
    if(bloqueado || card.classList.contains("flip") || card === primeira?.card) return;
    card.classList.add("flip");
    if(!primeira) { primeira = {card, img}; } 
    else {
        segunda = {card, img}; bloqueado = true;
        if(primeira.img === segunda.img) {
            const f = document.getElementById("feedback");
            f.style.display = "block";
            setTimeout(() => { f.style.display = "none"; }, 800);
            paresRestantes--; primeira = null; segunda = null; bloqueado = false;
            if(paresRestantes === 0) finalizarFase();
        } else {
            setTimeout(() => { 
                primeira.card.classList.remove("flip"); 
                segunda.card.classList.remove("flip"); 
                primeira = null; segunda = null; bloqueado = false; 
            }, 700);
        }
    }
}

function finalizarFase() {
    if(timerInterval) clearInterval(timerInterval);
    const modal = document.getElementById("modal-conclusao");
    const btnProxima = document.getElementById("btn-proxima-fase");
    const titulo = document.getElementById("titulo-vitoria");
    const msg = document.getElementById("msg-vitoria");

    if(jogoAtual.nivel === 3) {
        titulo.innerText = "⭐ DESAFIO CONCLUÍDO! ⭐";
        titulo.style.color = "#f1c40f";
        msg.innerText = `Parabéns, ${nomeUsuario}!\nVocê completou todos os níveis do MIS Ceará!`;
        btnProxima.classList.add("hidden"); // ESCONDE O BOTÃO NA FASE 3
        lancarConfetes();
    } else {
        titulo.innerText = "🏆 VITÓRIA!";
        titulo.style.color = var(--success);
        msg.innerText = `Muito bem, ${nomeUsuario}! Pronto para o próximo?`;
        btnProxima.classList.remove("hidden");
    }
    modal.classList.remove("hidden");
}

function lancarConfetes() {
    for (let i = 0; i < 80; i++) {
        const c = document.createElement("div"); c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        c.style.animationDuration = (Math.random() * 2 + 2) + "s";
        c.style.opacity = Math.random();
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}

function recomecarFase() { comecarJogo(jogoAtual.nivel); }
function proximaFase() { comecarJogo(jogoAtual.nivel + 1); }

window.onload = () => {
    criarTeclado();
    setTimeout(() => {
        const s = document.getElementById('splash-screen');
        if(s) s.style.display = 'none';
    }, 2500);
};
</script>
</body>
</html>
