<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Memória - MIS Ceará</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#006400">
    <link rel="apple-touch-icon" href="imagens/logo_app.png">

    <style>
        :root { 
            --primary: #006400; --secondary: #2196F3; --success: #27ae60; 
            --danger: #e74c3c; --dark: #121212;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); 
            color: white; text-align: center; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden; user-select: none;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed; inset: 0; background: #121212; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.6s ease;
        }
        .splash-logo { width: 200px; border-radius: 15px; margin-bottom: 20px; }

        /* Cabeçalho Fixo - Impede sobreposição */
        header { 
            height: 80px; /* Altura fixa para controle total */
            padding: 10px; 
            background: #1f1f1f; 
            border-bottom: 2px solid #333; 
            flex-shrink: 0; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
        }
        .header-player { font-size: 1.2rem; color: var(--secondary); font-weight: bold; }
        #status-bar { font-size: 0.9rem; min-height: 1.2em; margin-top: 4px; }

        /* Área Principal de Jogo - Ocupa o resto da tela */
        .main-content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px;
            overflow: hidden; /* Garante que nada saia da tela */
        }

        /* GRID INTELIGENTE: Ajusta o tamanho dos cards para caber na tela disponível */
        .grid { 
            display: grid; 
            gap: 10px; 
            width: 100%;
            height: 100%;
            max-width: 95vw;
            max-height: calc(100vh - 120px); /* Desconta o header e margens */
            margin: auto;
            justify-content: center;
            align-content: center;
            grid-template-columns: repeat(var(--cols, 4), minmax(20px, 1fr)); 
        }

        /* Cards Proporcionais */
        .card { 
            width: 100%;
            max-height: 20vh; /* Limita altura para não esticar demais */
            aspect-ratio: 1/1; 
            perspective: 1000px; 
            cursor: pointer; 
        }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flip .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; border-radius: 8px; backface-visibility: hidden; background-size: cover; background-position: center; }
        .front { background-image: url('imagens/capa.jpg'); border: 2px solid #444; }
        .back { transform: rotateY(180deg); border: 2px solid var(--primary); }

        /* Modal e Teclado */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .box { background: #222; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; border: 2px solid #444; }
        #nome-display { font-size: 24px; margin-bottom: 15px; background: #000; border: 2px solid var(--secondary); color: white; text-align: center; width: 100%; padding: 10px; border-radius: 8px; outline: none; }
        
        .teclado-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .key { flex: 1; padding: 15px 0; background: #333; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; border: 1px solid #444; }
        .key.active { background: var(--primary) !important; transform: scale(0.95); }
        .key.wide { flex: 2.5; }

        button { padding: 15px; font-size: 16px; cursor: pointer; border: none; background: var(--primary); color: white; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 5px; }
        .hidden { display: none !important; }
        .alerta { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="imagens/logo_ini.jpg" alt="Logo MIS" class="splash-logo">
    <div style="color: var(--success); letter-spacing: 2px;">CARREGANDO...</div>
</div>

<header>
    <div id="header-player" class="header-player">MIS CEARÁ</div>
    <div id="status-bar">Aguardando...</div>
</header>

<div class="main-content">
    <div id="menu" class="hidden">
        <h3 style="margin-bottom: 20px;">Escolha o Nível</h3>
        <div style="display: flex; flex-direction: column; width: 280px; margin: auto; gap: 10px;">
            <button onclick="comecarJogo(1)">Nível 1 - 4x4</button>
            <button onclick="comecarJogo(2)">Nível 2 - 5x4</button>
            <button onclick="comecarJogo(3)">Nível 3 - 6x4</button>
        </div>
    </div>
    <div id="grid" class="grid hidden"></div>
</div>

<div id="modal-nome" class="modal">
    <div class="box">
        <h2 style="margin-top:0">Identifique-se</h2>
        <input type="text" id="nome-display" maxlength="12" readonly>
        <div id="keys-container"></div>
        <button onclick="salvarNome()" style="background:var(--success); margin-top:15px;">ENTRAR</button>
    </div>
</div>

<script>
// --- SERVICE WORKER ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
}

// --- LOGICA TECLADO ---
function criarTeclado() {
    const container = document.getElementById("keys-container");
    const layout = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM", ["←", "Backspace"], ["ESPAÇO", " "]];
    layout.forEach(linha => {
        const row = document.createElement("div"); row.className = "teclado-row";
        if (typeof linha === "string") {
            linha.split("").forEach(char => row.appendChild(criarTecla(char, char)));
        } else {
            row.appendChild(criarTecla(linha[0], linha[1], true));
        }
        container.appendChild(row);
    });
}

function criarTecla(label, valor, wide = false) {
    const b = document.createElement("div");
    b.className = `key ${wide ? 'wide' : ''}`;
    b.id = `key-${valor === " " ? "Space" : valor}`;
    b.innerText = label;
    b.onclick = () => digitar(valor);
    return b;
}

function digitar(t) {
    const inp = document.getElementById("nome-display");
    const id = (t === " " || t === "Space") ? "key-Space" : `key-${t}`;
    const keyElement = document.getElementById(id);
    if (keyElement) { keyElement.classList.add("active"); setTimeout(() => keyElement.classList.remove("active"), 150); }
    if (t === "Backspace" || t === "←") inp.value = inp.value.slice(0, -1);
    else if (t === "Enter") salvarNome();
    else if ((t === " " || t === "Space") && inp.value.length < 12) inp.value += " ";
    else if (t.length === 1 && inp.value.length < 12) inp.value += t.toUpperCase();
}

window.addEventListener("keydown", (e) => {
    if (!document.getElementById("modal-nome").classList.contains("hidden")) {
        if (e.key.match(/^[a-zA-Z ]$/) || e.key === "Backspace" || e.key === "Enter") {
            e.preventDefault(); digitar(e.key === " " ? "Space" : e.key);
        }
    }
});

function salvarNome() {
    nomeUsuario = document.getElementById("nome-display").value.trim().toUpperCase() || "JOGADOR";
    document.getElementById("modal-nome").classList.add("hidden");
    document.getElementById("header-player").innerText = `JOGADOR: ${nomeUsuario}`;
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("status-bar").innerText = "Selecione a dificuldade";
}

// --- LOGICA JOGO ---
const fases = { 1: { pares: 8, cols: 4, tempo: 45 }, 2: { pares: 10, cols: 5, tempo: 60 }, 3: { pares: 12, cols: 6, tempo: 90 } };
let nomeUsuario = "", tempoRestante, timerInterval, primeira, segunda, bloqueado = true, paresRestantes;

function comecarJogo(n) {
    const jogo = fases[n];
    paresRestantes = jogo.pares; tempoRestante = jogo.tempo; bloqueado = true;
    const grid = document.getElementById("grid");
    document.getElementById("menu").classList.add("hidden");
    grid.classList.remove("hidden");
    grid.style.setProperty('--cols', jogo.cols);
    grid.innerHTML = "";

    let nums = []; for(let i=2; i<=40; i++) nums.push(i);
    nums.sort(() => Math.random() - 0.5);
    let deck = [...nums.slice(0, jogo.pares), ...nums.slice(0, jogo.pares)].sort(() => Math.random() - 0.5);

    deck.forEach(n => {
        const c = document.createElement("div"); c.className = "card flip";
        c.innerHTML = `<div class="inner"><div class="front"></div><div class="back" style="background-image:url('imagens/${n}.jpg')"></div></div>`;
        c.onclick = () => clicarCarta(c, n);
        grid.appendChild(c);
    });

    setTimeout(() => { document.querySelectorAll(".card").forEach(c => c.classList.remove("flip")); bloqueado = false; iniciarTimer(); }, 3000);
}

function clicarCarta(c, n) {
    if (bloqueado || c.classList.contains("flip") || c === primeira?.c) return;
    c.classList.add("flip");
    if (!primeira) { primeira = {c, n}; }
    else {
        segunda = {c, n}; bloqueado = true;
        if (primeira.n === segunda.n) { 
            paresRestantes--; primeira = null; segunda = null; bloqueado = false; 
            if (paresRestantes === 0) { clearInterval(timerInterval); alert("Venceu!"); location.reload(); }
        } else {
            setTimeout(() => { primeira.c.classList.remove("flip"); segunda.c.classList.remove("flip"); primeira = null; segunda = null; bloqueado = false; }, 700);
        }
    }
}

function iniciarTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        tempoRestante--;
        const s = document.getElementById("status-bar");
        s.innerText = `Tempo: ${tempoRestante}s`;
        if(tempoRestante <= 10) s.classList.add("alerta");
        if(tempoRestante <= 0) { clearInterval(timerInterval); alert("Fim de tempo!"); location.reload(); }
    }, 1000);
}

window.onload = () => {
    criarTeclado();
    setTimeout(() => {
        const s = document.getElementById('splash-screen');
        if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 600); }
    }, 2000);
};
</script>
</body>
</html>
