<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Memória - MIS Ceará</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#006400">
    <link rel="apple-touch-icon" href="imagens/logo_app.png">

    <style>
        :root { 
            --primary: #006400; --secondary: #2196F3; --success: #27ae60; 
            --danger: #e74c3c; --dark: #121212;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); 
            color: white; text-align: center; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden; user-select: none;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed; inset: 0; background: #121212; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.6s ease;
        }
        .splash-logo { width: 200px; border-radius: 15px; margin-bottom: 20px; }

        /* Cabeçalho Fixo e Protegido */
        header { 
            height: 15vh; /* Proporcional à tela */
            min-height: 80px;
            padding: 10px; 
            background: #1f1f1f; 
            border-bottom: 3px solid var(--primary); 
            flex-shrink: 0; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
        }
        .header-player { font-size: clamp(1rem, 4vw, 1.4rem); color: var(--secondary); font-weight: bold; }
        #status-bar { font-size: clamp(0.8rem, 3vw, 1rem); margin-top: 5px; }

        /* Container Principal com Ajuste Automático */
        .main-content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 2vh;
            overflow: hidden;
        }

        /* Grid que se adapta ao espaço restante */
        .grid { 
            display: grid; 
            gap: 1.5vh; 
            width: 100%;
            height: 100%;
            max-height: 75vh; /* Garante que não suba no header */
            margin: auto;
            justify-content: center;
            align-content: center;
            grid-template-columns: repeat(var(--cols, 4), minmax(50px, 1fr)); 
        }

        /* Card Responsivo */
        .card { 
            width: 100%;
            max-height: 18vh;
            aspect-ratio: 1/1; 
            perspective: 1000px; 
            cursor: pointer; 
        }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flip .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; border-radius: 10px; backface-visibility: hidden; background-size: cover; background-position: center; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .front { background-image: url('imagens/capa.jpg'); border: 2px solid #333; }
        .back { transform: rotateY(180deg); border: 3px solid var(--primary); }

        /* Modais */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .box { background: #222; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; border: 2px solid #444; }
        #nome-display { font-size: 32px; margin-bottom: 20px; background: #000; border: 2px solid var(--secondary); color: white; text-align: center; width: 100%; padding: 15px; border-radius: 10px; text-transform: uppercase; }
        
        /* Teclado Virtual */
        .teclado-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .key { flex: 1; padding: 20px 0; background: #333; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; border: 1px solid #555; transition: 0.1s; }
        .key.active { background: var(--primary) !important; color: white; transform: scale(0.92); border-color: var(--success); }
        .key.wide { flex: 2.5; background: #444; }

        button { padding: 20px; font-size: 1.2rem; cursor: pointer; border: none; background: var(--primary); color: white; border-radius: 10px; width: 100%; font-weight: bold; transition: 0.2s; }
        button:active { filter: brightness(1.3); }
        .hidden { display: none !important; }
        .alerta { color: var(--danger); font-weight: bold; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="imagens/logo_ini.jpg" alt="Logo MIS" class="splash-logo">
    <div class="loader-text" style="color: var(--success);">INICIALIZANDO...</div>
</div>

<header>
    <div id="header-player" class="header-player">MIS CEARÁ - MEMÓRIA</div>
    <div id="status-bar">Carregando componentes...</div>
</header>

<div class="main-content">
    <div id="menu" class="hidden">
        <h2 style="margin-bottom: 30px;">Escolha o Nível de Dificuldade</h2>
        <div style="display: flex; flex-direction: column; width: 320px; margin: auto; gap: 15px;">
            <button onclick="comecarJogo(1)">Nível 1 (4x4)</button>
            <button onclick="comecarJogo(2)">Nível 2 (5x4)</button>
            <button onclick="comecarJogo(3)">Nível 3 (6x4)</button>
        </div>
    </div>
    <div id="grid" class="grid hidden"></div>
</div>

<div id="modal-nome" class="modal">
    <div class="box">
        <h2 style="margin-top:0; color: var(--secondary);">Quem está jogando?</h2>
        <input type="text" id="nome-display" maxlength="12" placeholder="NOME" readonly>
        <div id="keys-container"></div>
        <button onclick="salvarNome()" style="background:var(--success); margin-top:20px;">CONFIRMAR (ENTER)</button>
    </div>
</div>

<script>
// --- VARIÁVEIS DE ESTADO ---
const fases = { 1: { pares: 8, cols: 4, tempo: 45 }, 2: { pares: 10, cols: 5, tempo: 60 }, 3: { pares: 12, cols: 6, tempo: 90 } };
let nomeUsuario = "", tempoRestante, timerInterval, primeira, segunda, bloqueado = true, paresRestantes;

// --- TECLADO HÍBRIDO (FÍSICO + VIRTUAL) ---
function criarTeclado() {
    const container = document.getElementById("keys-container");
    const layout = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM", ["←", "Backspace"], ["ESPAÇO", " "]];
    layout.forEach(linha => {
        const row = document.createElement("div"); row.className = "teclado-row";
        if (typeof linha === "string") {
            linha.split("").forEach(char => row.appendChild(criarTecla(char, char)));
        } else {
            row.appendChild(criarTecla(linha[0], linha[1], true));
        }
        container.appendChild(row);
    });
}

function criarTecla(label, valor, wide = false) {
    const b = document.createElement("div");
    b.className = `key ${wide ? 'wide' : ''}`;
    b.id = `key-${valor === " " ? "Space" : valor}`;
    b.innerText = label;
    b.onclick = () => digitar(valor);
    return b;
}

function digitar(t) {
    const inp = document.getElementById("nome-display");
    const id = (t === " " || t === "Space") ? "key-Space" : `key-${t}`;
    const keyElement = document.getElementById(id);
    
    if (keyElement) { 
        keyElement.classList.add("active"); 
        setTimeout(() => keyElement.classList.remove("active"), 150); 
    }

    if (t === "Backspace" || t === "←") inp.value = inp.value.slice(0, -1);
    else if (t === "Enter") salvarNome();
    else if ((t === " " || t === "Space") && inp.value.length < 12) inp.value += " ";
    else if (t.length === 1 && inp.value.length < 12) inp.value += t.toUpperCase();
}

window.addEventListener("keydown", (e) => {
    if (!document.getElementById("modal-nome").classList.contains("hidden")) {
        const k = e.key;
        if (k.match(/^[a-zA-Z ]$/) || k === "Backspace" || k === "Enter") {
            if (k !== "Tab") e.preventDefault();
            digitar(k === " " ? "Space" : k);
        }
    }
});

function salvarNome() {
    nomeUsuario = document.getElementById("nome-display").value.trim().toUpperCase() || "JOGADOR";
    document.getElementById("modal-nome").classList.add("hidden");
    document.getElementById("header-player").innerText = `JOGADOR: ${nomeUsuario}`;
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("status-bar").innerText = "Pronto para iniciar!";
}

// --- LÓGICA DO JOGO ---
function comecarJogo(n) {
    const jogo = fases[n];
    paresRestantes = jogo.pares; tempoRestante = jogo.tempo; bloqueado = true;
    const grid = document.getElementById("grid");
    document.getElementById("menu").classList.add("hidden");
    grid.classList.remove("hidden");
    grid.style.setProperty('--cols', jogo.cols);
    grid.innerHTML = "";

    // Sorteio de imagens (2 a 40)
    let nums = Array.from({length: 39}, (_, i) => i + 2).sort(() => Math.random() - 0.5);
    let selecionadas = nums.slice(0, jogo.pares);
    let deck = [...selecionadas, ...selecionadas].sort(() => Math.random() - 0.5);

    deck.forEach(imgNum => {
        const c = document.createElement("div"); c.className = "card flip";
        c.innerHTML = `<div class="inner"><div class="front"></div><div class="back" style="background-image:url('imagens/${imgNum}.jpg')"></div></div>`;
        c.onclick = () => clicarCarta(c, imgNum);
        grid.appendChild(c);
    });

    document.getElementById("status-bar").innerText = "Memorize as cartas!";
    setTimeout(() => { 
        document.querySelectorAll(".card").forEach(c => c.classList.remove("flip")); 
        bloqueado = false; 
        iniciarTimer(); 
    }, 3000);
}

function clicarCarta(c, n) {
    if (bloqueado || c.classList.contains("flip") || c === primeira?.c) return;
    c.classList.add("flip");
    if (!primeira) { primeira = {c, n}; }
    else {
        segunda = {c, n}; bloqueado = true;
        if (primeira.n === segunda.n) { 
            paresRestantes--; primeira = null; segunda = null; bloqueado = false; 
            if (paresRestantes === 0) fimDeJogo(true);
        } else {
            setTimeout(() => { 
                primeira.c.classList.remove("flip"); 
                segunda.c.classList.remove("flip"); 
                primeira = null; segunda = null; bloqueado = false; 
            }, 800);
        }
    }
}

function iniciarTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        tempoRestante--;
        const s = document.getElementById("status-bar");
        s.innerText = `TEMPO RESTANTE: ${tempoRestante}s`;
        if(tempoRestante <= 10) s.classList.add("alerta");
        if(tempoRestante <= 0) fimDeJogo(false);
    }, 1000);
}

function fimDeJogo(vitoria) {
    clearInterval(timerInterval);
    if(vitoria) alert(`🏆 PARABÉNS, ${nomeUsuario}! Você encontrou todos os pares.`);
    else alert("⏰ O TEMPO ACABOU! Tente novamente.");
    location.reload();
}

// --- INICIALIZAÇÃO ---
window.onload = () => {
    criarTeclado();
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
    setTimeout(() => {
        const s = document.getElementById('splash-screen');
        if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 600); }
        document.getElementById("status-bar").innerText = "Aguardando identificação...";
    }, 2000);
};
</script>
</body>
</html>
