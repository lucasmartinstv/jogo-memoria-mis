<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Memória - MIS Ceará</title>
    
    <style>
        :root { 
            --primary: #006400; --secondary: #2196F3; --success: #27ae60; 
            --danger: #e74c3c; --dark: #121212; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); 
            color: white; text-align: center; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed; inset: 0; background: #121212; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999;
        }

        header { height: 12vh; background: #1f1f1f; border-bottom: 2px solid #333; display: flex; flex-direction: column; justify-content: center; flex-shrink: 0; }
        .header-player { font-size: 3vh; color: var(--secondary); font-weight: bold; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2vh; overflow: hidden; }

        .grid { 
            display: grid; gap: 1.5vh; height: 100%; max-height: 75vh;
            grid-template-columns: repeat(var(--cols, 4), minmax(0, 1fr)); 
            aspect-ratio: var(--cols) / calc((var(--total-pares) * 2) / var(--cols));
        }

        .card { width: 100%; height: 100%; perspective: 1000px; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flip .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; border-radius: 10px; backface-visibility: hidden; background-size: cover; background-position: center; }
        .front { background-image: url('imagens/capa.jpg'); border: 2px solid #444; }
        .back { transform: rotateY(180deg); border: 2px solid var(--primary); }

        /* Modais - Z-index alto para garantir visibilidade */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 5000; visibility: visible; opacity: 1; }
        .box { background: #222; padding: 3vh; border-radius: 15px; width: 85vw; max-width: 800px; display: flex; flex-direction: column; gap: 1.5vh; border: 2px solid #444; }

        /* Feedback "Você Acertou" - Z-index mais alto que os modais */
        #feedback { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--success); color: white; padding: 3vh 6vh; 
            border-radius: 50px; font-size: 5vh; font-weight: bold; 
            z-index: 10000; display: none; pointer-events: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Teclado */
        .teclado-row { display: flex; justify-content: center; gap: 0.5vw; }
        .key { flex: 1; padding: 2vh 0; background: #333; border-radius: 5px; font-size: 2.2vh; border: 1px solid #444; color: white; cursor: pointer; }
        
        button { padding: 2vh; font-size: 2.5vh; font-weight: bold; border-radius: 10px; border: none; color: white; cursor: pointer; width: 100%; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="imagens/logo_ini.jpg" style="width: 200px; border-radius: 20px; margin-bottom: 20px;">
    <div style="font-size: 2vh; color: var(--success);">CARREGANDO...</div>
</div>

<div id="feedback">VOCÊ ACERTOU!</div>

<header>
    <div style="font-size: 1.5vh; opacity: 0.7;">MIS CEARÁ</div>
    <div id="header-player" class="header-player">IDENTIFIQUE-SE</div>
    <div id="status-bar" style="font-size: 2vh; min-height: 1.2em;"></div>
</header>

<div class="main-content">
    <div id="menu" class="hidden">
        <h2 style="margin-bottom: 2vh; font-size: 4vh;">Escolha o Nível</h2>
        <div style="display: flex; flex-direction: column; width: 300px; margin: auto; gap: 10px;">
            <button onclick="comecarJogo(1)" style="background: var(--primary);">NÍVEL 1</button>
            <button onclick="comecarJogo(2)" style="background: var(--primary);">NÍVEL 2</button>
            <button onclick="comecarJogo(3)" style="background: var(--primary);">NÍVEL 3</button>
        </div>
    </div>
    <div id="grid" class="grid hidden"></div>
</div>

<div id="modal-nome" class="modal">
    <div class="box">
        <h2 style="font-size: 3vh;">Digite seu Nome</h2>
        <input type="text" id="nome-display" style="font-size: 4vh; padding: 1.5vh; background: #000; border: 2px solid var(--secondary); color: white; text-align: center;" readonly>
        <div id="keys-container"></div>
        <div style="display: flex; gap: 10px;">
            <button onclick="salvarNome()" style="background: var(--success);">CONFIRMAR</button>
            <button onclick="jogarSemNome()" style="background: #555;">PULAR</button>
        </div>
    </div>
</div>

<div id="modal-conclusao" class="modal hidden">
    <div class="box">
        <h2 id="titulo-vitoria" style="color: var(--success); font-size: 4vh;">🏆 Vitória!</h2>
        <p id="msg-vitoria" style="font-size: 3vh;"></p>
        <button id="btn-continuar" onclick="proximaFase()" style="background: var(--success);">PRÓXIMA FASE</button>
        <button onclick="voltarInicio()" style="background: #444;">MENU</button>
    </div>
</div>

<div id="modal-gameover" class="modal hidden">
    <div class="box">
        <h2 style="color: var(--danger); font-size: 4vh;">⏰ TEMPO ESGOTADO</h2>
        <button onclick="recomecarFase()" style="background: var(--secondary);">TENTAR NOVAMENTE</button>
        <button onclick="voltarInicio()" style="background: #444;">SAIR</button>
    </div>
</div>

<script>
const MIN_IMAGEM = 2, MAX_IMAGEM = 40;
const fases = { 1: { pares: 8, colunas: 4, tempo: 45, preview: 2 }, 2: { pares: 10, colunas: 5, tempo: 60, preview: 3 }, 3: { pares: 12, colunas: 6, tempo: 90, preview: 4 } };
let nomeUsuario = "", jogoAtual, primeira, segunda, bloqueado = true, paresRestantes, tempoRestante, timerInterval = null;

function criarTeclado() {
    const container = document.getElementById("keys-container");
    const layout = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM", "← "];
    container.innerHTML = "";
    layout.forEach(linha => {
        const row = document.createElement("div"); row.className = "teclado-row";
        const teclas = linha.includes(" ") ? ["←", "ESPAÇO"] : linha.split("");
        teclas.forEach(t => {
            const b = document.createElement("div"); b.className = "key";
            if(t.length > 1) b.style.flex = "2";
            b.innerText = t; 
            b.onclick = () => digitar(t === "←" ? "BS" : t === "ESPAÇO" ? "SP" : t);
            row.appendChild(b);
        });
        container.appendChild(row);
    });
}

function digitar(t) {
    const inp = document.getElementById("nome-display");
    if(t === "BS") inp.value = inp.value.slice(0, -1);
    else if(t === "SP") { if(inp.value.length < 12) inp.value += " "; }
    else if(inp.value.length < 12) inp.value += t;
}

function salvarNome() { nomeUsuario = document.getElementById("nome-display").value.trim() || "VISITANTE"; finalizarLogin(); }
function jogarSemNome() { nomeUsuario = "VISITANTE"; finalizarLogin(); }
function finalizarLogin() { document.getElementById("modal-nome").classList.add("hidden"); document.getElementById("header-player").innerText = `JOGADOR: ${nomeUsuario}`; voltarInicio(); }

function fecharTodosModais() {
    document.getElementById("modal-conclusao").classList.add("hidden");
    document.getElementById("modal-gameover").classList.add("hidden");
    document.getElementById("modal-nome").classList.add("hidden");
}

function voltarInicio() { 
    clearInterval(timerInterval); 
    timerInterval = null;
    fecharTodosModais();
    document.getElementById("grid").classList.add("hidden"); 
    document.getElementById("menu").classList.remove("hidden"); 
    document.getElementById("status-bar").innerText = "";
}

function comecarJogo(n) {
    // Reset crítico de timers para o UC Browser
    if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    
    fecharTodosModais();
    jogoAtual = {...fases[n], nivel: n};
    document.getElementById("menu").classList.add("hidden");
    
    const g = document.getElementById("grid"); 
    g.classList.remove("hidden");
    g.style.setProperty('--cols', jogoAtual.colunas); 
    g.style.setProperty('--total-pares', jogoAtual.pares);
    g.innerHTML = "";
    
    paresRestantes = jogoAtual.pares; 
    tempoRestante = jogoAtual.tempo; 
    bloqueado = true;
    primeira = null; 
    segunda = null;
    
    let p = []; for(let i=MIN_IMAGEM; i<=MAX_IMAGEM; i++) p.push(i);
    p.sort(() => Math.random()-0.5);
    const sel = p.slice(0, jogoAtual.pares).map(num => `imagens/${num}.jpg`);
    let deck = [...sel, ...sel].sort(() => Math.random()-0.5);
    
    deck.forEach(url => {
        const c = document.createElement("div"); c.className = "card flip";
        c.innerHTML = `<div class="inner"><div class="front"></div><div class="back" style="background-image:url('${url}')"></div></div>`;
        c.onclick = () => clicarCarta(c, url); g.appendChild(c);
    });

    document.getElementById("status-bar").innerText = "MEMORIZE!";
    setTimeout(() => { 
        document.querySelectorAll(".card").forEach(c => c.classList.remove("flip")); 
        bloqueado = false; 
        iniciarCronometro(); 
    }, jogoAtual.preview * 1000);
}

function iniciarCronometro() {
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        tempoRestante--; 
        document.getElementById("status-bar").innerText = `TEMPO: ${tempoRestante}s`;
        if(tempoRestante <= 0) { 
            clearInterval(timerInterval); 
            timerInterval = null;
            document.getElementById("modal-gameover").classList.remove("hidden"); 
        }
    }, 1000);
}

function clicarCarta(card, img) {
    if(bloqueado || card.classList.contains("flip") || card === primeira?.card) return;
    card.classList.add("flip");
    if(!primeira) { primeira = {card, img}; } 
    else {
        segunda = {card, img}; bloqueado = true;
        if(primeira.img === segunda.img) {
            // Mostrar Feedback "Você Acertou"
            const f = document.getElementById("feedback");
            f.style.display = "block";
            setTimeout(() => { f.style.display = "none"; }, 800);

            paresRestantes--; primeira = null; segunda = null; bloqueado = false;
            if(paresRestantes === 0) finalizarFase();
        } else {
            setTimeout(() => { 
                primeira.card.classList.remove("flip"); 
                segunda.card.classList.remove("flip"); 
                primeira = null; segunda = null; bloqueado = false; 
            }, 700);
        }
    }
}

function finalizarFase() {
    if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.getElementById("msg-vitoria").innerText = `Muito bem, ${nomeUsuario}!`;
    document.getElementById("modal-conclusao").classList.remove("hidden");
}

function recomecarFase() { comecarJogo(jogoAtual.nivel); }
function proximaFase() { comecarJogo(jogoAtual.nivel + 1); }

window.onload = () => {
    criarTeclado();
    setTimeout(() => {
        document.getElementById('splash-screen').style.display = 'none';
    }, 2000);
};
</script>
</body>
</html>
